<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="Steam Store BD">
  <defs>
    <linearGradient id="iconBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
  </defs>

  <!-- Blue gradient rounded square background -->
  <rect width="48" height="48" rx="11" fill="url(#iconBg)"/>

  <!-- Game controller (white, centred) -->
  <!-- Main body -->
  <rect x="9"  y="17" width="30" height="16" rx="6" fill="white" opacity="0.95"/>
  <!-- Left grip -->
  <rect x="9"  y="28" width="10" height="11" rx="5" fill="white" opacity="0.95"/>
  <!-- Right grip -->
  <rect x="29" y="28" width="10" height="11" rx="5" fill="white" opacity="0.95"/>

  <!-- Left shoulder bump -->
  <rect x="10" y="13" width="10" height="7"  rx="4" fill="white" opacity="0.80"/>
  <!-- Right shoulder bump -->
  <rect x="28" y="13" width="10" height="7"  rx="4" fill="white" opacity="0.80"/>

  <!-- D-pad horizontal -->
  <rect x="13" y="23" width="9"  height="3"  rx="1.5" fill="#2563EB"/>
  <!-- D-pad vertical -->
  <rect x="16" y="20" width="3"  height="9"  rx="1.5" fill="#2563EB"/>

  <!-- Face buttons -->
  <circle cx="34"   cy="21.5" r="2"   fill="#60A5FA"/>
  <circle cx="37.5" cy="25"   r="2"   fill="#93C5FD"/>
  <circle cx="30.5" cy="25"   r="2"   fill="#BFDBFE"/>
  <circle cx="34"   cy="28.5" r="2"   fill="#DBEAFE"/>

  <!-- Centre button -->
  <circle cx="24" cy="25" r="2.5" fill="#1D4ED8" opacity="0.7"/>
  <circle cx="24" cy="25" r="1.2" fill="white"   opacity="0.9"/>
</svg>
